$connection = mysqli_connect("localhost","root","","club_informatique");

if(!$connection){
    die("Erreur : " . mysqli_connect_error());
}

$nom = mysqli_real_escape_string($connection, $nom);
$prenom = mysqli_real_escape_string($connection, $prenom);
$email = mysqli_real_escape_string($connection, $email);
$number = mysqli_real_escape_string($connection, $number);
$niveau = mysqli_real_escape_string($connection, $niveau);

$requete = mysqli_query($connection,"INSERT INTO les_inscrits(Nom,Prenom,Email,Telephone,Niveau)
VALUES ('$nom','$prenom','$email','$number','$niveau')");

if($requete){
    echo "<h2>Inscription réussie !</h2>";
    echo "<p>Bienvenue au club informatique.</p>";
}
else{
    echo "<h2>Erreur</h2>";
    echo mysqli_error($connection);
